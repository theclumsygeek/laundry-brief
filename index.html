<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<meta name="color-scheme" content="light dark">
<title>Laundry Brief</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Archivo+Black&family=IBM+Plex+Mono:wght@400;700&display=swap" rel="stylesheet">
<style>
  html, body { margin: 0; padding: 0; min-height: 100%; background: #f3efe6; }
  /* Advertise scheme at the document root so browsers (e.g. Samsung Internet)
     skip their "Force Dark" auto-darkening and let the app theme itself. */
  html { color-scheme: light dark; }
  /* `only` forbids the browser (e.g. Samsung Internet "dark sites") from
     force-darkening the page; plain `light`/`dark` merely declares support. */
  html[data-theme="light"] { color-scheme: only light; }
  html[data-theme="dark"] { color-scheme: only dark; }
  @media (prefers-color-scheme: dark) { html, body { background: #14181b; } }
</style>
</head>
<body>
<div id="laundry-root"></div>
<style>
  html[data-theme="light"] body, html[data-theme="light"] { background: #f3efe6 !important; }
  html[data-theme="dark"] body, html[data-theme="dark"] { background: #14181b !important; }
  #laundry-root {
    --paper: #f3efe6;
    --ink: #20262b;
    --ink-soft: #5a6168;
    --ink-faint: #8b9097;
    --card: #ffffff;
    --line: rgba(32,38,43,0.13);
    --rope: #a8703f;
    --dry-line: #4f86c6;
    --good-bg: #e6efe0;
    --good-fg: #3f5c34;
    --good-line: #7fa066;
    --warn-bg: #f8edd6;
    --warn-fg: #8a5a13;
    --warn-line: #d9a13e;
    --bad-bg: #f5e2de;
    --bad-fg: #8a3324;
    --bad-line: #c4604a;
    --shadow: 0 1px 2px rgba(32,38,43,0.05);

    color-scheme: light dark;
    font-family: 'IBM Plex Mono', 'SF Mono', Menlo, monospace;
    color: var(--ink);
    background: var(--paper);
    min-height: 100%;
    box-sizing: border-box;
    padding: 0;
    transition: background 0.2s ease, color 0.2s ease;
  }
  #laundry-root[data-theme="dark"] {
    --paper: #14181b;
    --ink: #ece8de;
    --ink-soft: #a8aeb3;
    --ink-faint: #6f767c;
    --card: #1c2125;
    --line: rgba(236,232,222,0.12);
    --rope: #d99a5e;
    --dry-line: #5b91c9;
    --good-bg: #1f2c1c;
    --good-fg: #a8d18f;
    --good-line: #4c6b3d;
    --warn-bg: #332a16;
    --warn-fg: #f0c374;
    --warn-line: #8a6a2c;
    --bad-bg: #321e1b;
    --bad-fg: #f0a08c;
    --bad-line: #8a4332;
    --shadow: none;
  }
  @media (prefers-color-scheme: dark) {
    #laundry-root:not([data-theme="light"]) {
      --paper: #14181b;
      --ink: #ece8de;
      --ink-soft: #a8aeb3;
      --ink-faint: #6f767c;
      --card: #1c2125;
      --line: rgba(236,232,222,0.12);
      --rope: #d99a5e;
      --dry-line: #5b91c9;
      --good-bg: #1f2c1c;
      --good-fg: #a8d18f;
      --good-line: #4c6b3d;
      --warn-bg: #332a16;
      --warn-fg: #f0c374;
      --warn-line: #8a6a2c;
      --bad-bg: #321e1b;
      --bad-fg: #f0a08c;
      --bad-line: #8a4332;
      --shadow: none;
    }
  }
  #laundry-root * { box-sizing: border-box; }

  .lb-wrap {
    max-width: 640px;
    margin: 0 auto;
    padding: 26px 22px 40px;
  }

  .lb-masthead {
    display: flex;
    justify-content: space-between;
    align-items: center;
    border-bottom: 2px solid var(--ink);
    padding-bottom: 12px;
    margin-bottom: 4px;
  }
  .lb-masthead-left { display: flex; align-items: baseline; gap: 10px; }
  .lb-masthead h1 {
    font-family: 'Archivo Black', 'Helvetica Neue', Arial, sans-serif;
    font-size: 18px;
    letter-spacing: 0.01em;
    margin: 0;
    text-transform: uppercase;
  }
  .lb-masthead .lb-loc {
    font-size: 11px;
    letter-spacing: 0.06em;
    text-transform: uppercase;
    color: var(--ink-faint);
  }
  .lb-theme-toggle {
    display: flex;
    border: 1px solid var(--line);
    border-radius: 14px;
    padding: 2px;
    gap: 1px;
  }
  .lb-theme-toggle button {
    font-family: inherit;
    font-size: 13px;
    line-height: 1;
    background: none;
    border: none;
    border-radius: 12px;
    padding: 4px 9px;
    cursor: pointer;
    color: var(--ink-faint);
  }
  .lb-theme-toggle button.active {
    background: var(--ink);
    color: var(--paper);
  }
  .lb-loc-stack { display: flex; flex-direction: column; align-items: flex-start; gap: 4px; }
  .lb-sethome {
    font-family: inherit;
    font-size: 9.5px;
    line-height: 1;
    background: none;
    border: none;
    padding: 0 2px;
    cursor: pointer;
    color: var(--ink-faint);
    text-decoration: underline dotted;
    letter-spacing: 0.03em;
  }
  .lb-sethome:hover { color: var(--ink); }
  .lb-loc-toggle { display: flex; border: 1px solid var(--line); border-radius: 14px; padding: 2px; gap: 1px; }
  .lb-loc-toggle button {
    font-family: inherit;
    font-size: 11px;
    line-height: 1;
    background: none;
    border: none;
    border-radius: 12px;
    padding: 4px 8px;
    cursor: pointer;
    color: var(--ink-faint);
    white-space: nowrap;
  }
  .lb-loc-toggle button.active { background: var(--ink); color: var(--paper); }
  .lb-loc[data-saveable="true"] { cursor: pointer; text-decoration: underline dotted; }

  .lb-updated {
    font-size: 10.5px;
    color: var(--ink-faint);
    margin: 8px 0 22px;
    letter-spacing: 0.02em;
    display: flex;
    align-items: center;
    gap: 8px;
  }
  .lb-updated button {
    font-family: inherit;
    font-size: 10.5px;
    background: none;
    border: 1px solid var(--line);
    border-radius: 3px;
    padding: 2px 9px;
    cursor: pointer;
    color: var(--ink-soft);
  }
  .lb-updated button:hover { color: var(--ink); border-color: var(--ink-soft); }

  /* Verdict block */
  .lb-verdict {
    border: 1.5px solid var(--ink);
    border-radius: 6px;
    padding: 22px 20px;
    margin-bottom: 28px;
    position: relative;
    overflow: hidden;
    box-shadow: var(--shadow);
  }
  .lb-verdict.good { background: var(--good-bg); border-color: var(--good-line); }
  .lb-verdict.warn { background: var(--warn-bg); border-color: var(--warn-line); }
  .lb-verdict.bad  { background: var(--bad-bg);  border-color: var(--bad-line); }
  .lb-verdict.loading { background: var(--card); }
  .lb-verdict.good .lb-eyebrow,  .lb-verdict.good .lb-headline  { color: var(--good-fg); }
  .lb-verdict.warn .lb-eyebrow,  .lb-verdict.warn .lb-headline  { color: var(--warn-fg); }
  .lb-verdict.bad  .lb-eyebrow,  .lb-verdict.bad  .lb-headline  { color: var(--bad-fg); }

  .lb-eyebrow {
    font-size: 10.5px;
    text-transform: uppercase;
    letter-spacing: 0.1em;
    color: var(--ink-soft);
    margin-bottom: 8px;
  }
  .lb-eyebrow .lb-src {
    opacity: 0.6;
    font-weight: 600;
  }
  .lb-headline {
    font-family: 'Archivo Black', 'Helvetica Neue', Arial, sans-serif;
    font-size: 25px;
    line-height: 1.18;
    margin: 0 0 10px;
    text-transform: uppercase;
    color: var(--ink);
  }
  .lb-sub {
    font-size: 13.5px;
    line-height: 1.55;
    margin: 0;
    color: var(--ink-soft);
  }

  /* Timeline */
  .lb-timeline-label, .lb-strip-label {
    font-size: 10.5px;
    text-transform: uppercase;
    letter-spacing: 0.1em;
    color: var(--ink-faint);
    margin-bottom: 10px;
  }
  .lb-est-badge {
    display: inline-block;
    margin-left: 8px;
    padding: 1px 6px;
    background: var(--warn-bg);
    border: 1px solid var(--warn-line);
    border-radius: 8px;
    font-size: 8.5px;
    letter-spacing: 0.08em;
    color: var(--warn-fg);
    vertical-align: middle;
    cursor: help;
  }
  .lb-timeline { margin-bottom: 30px; }
  .lb-track { position: relative; height: 96px; }
  .lb-track svg { width: 100%; height: 100%; display: block; }
  /* Bar captions in HTML (not SVG) so they keep full width on narrow screens. */
  .lb-track-cap {
    position: absolute;
    left: 1px;
    font-size: 8.5px;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    color: var(--ink-faint);
    pointer-events: none;
    z-index: 1;
  }
  .lb-track-cap-stage { top: 0; }
  .lb-track-cap-risk { top: 34px; }
  /* Ticks are absolutely positioned from the same xOf() the bars use, so each
     label sits exactly under its hour on the SVG (no flex space-between guesswork). */
  .lb-track-labels {
    position: relative;
    height: 12px;
    font-size: 10px;
    color: var(--ink-faint);
    margin-top: 6px;
  }
  .lb-track-labels span { position: absolute; white-space: nowrap; }
  .lb-legend {
    display: flex;
    flex-direction: column;
    gap: 9px;
    margin-top: 14px;
    padding-top: 12px;
    border-top: 1px solid var(--line);
  }
  .lb-legend-group {
    display: flex;
    flex-wrap: wrap;
    align-items: center;
    gap: 8px 14px;
  }
  .lb-legend-title {
    font-size: 9px;
    text-transform: uppercase;
    letter-spacing: 0.08em;
    color: var(--ink-faint);
    flex: 0 0 64px;
  }
  .lb-legend-item {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    font-size: 10px;
    color: var(--ink-soft);
  }
  .lb-legend-item i {
    width: 10px;
    height: 10px;
    border-radius: 2px;
    display: inline-block;
    flex-shrink: 0;
  }

  /* Fabric picker */
  .lb-fabric-picker { margin-bottom: 18px; }
  .lb-fabric-chips { display: flex; flex-wrap: wrap; gap: 7px; margin-bottom: 12px; }
  .lb-fabric-chip {
    font-family: inherit;
    font-size: 11.5px;
    display: inline-flex;
    align-items: center;
    gap: 6px;
    background: var(--card);
    border: 1px solid var(--line);
    border-radius: 16px;
    padding: 6px 12px 6px 10px;
    color: var(--ink-soft);
    cursor: pointer;
    transition: background 0.15s ease, color 0.15s ease, border-color 0.15s ease;
  }
  .lb-fabric-chip span { font-size: 13px; }
  .lb-fabric-chip:hover { border-color: var(--ink-soft); }
  .lb-fabric-chip.active {
    background: var(--ink);
    color: var(--paper);
    border-color: var(--ink);
  }
  .lb-weather-readout {
    display: flex;
    flex-wrap: wrap;
    gap: 6px 14px;
    font-size: 10.5px;
    color: var(--ink-faint);
  }

  /* Per-fabric breakdown */
  .lb-fabric-breakdown {
    border: 1px solid var(--line);
    border-radius: 6px;
    overflow: hidden;
    margin-bottom: 28px;
  }
  .lb-fabric-row {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 10px 14px;
    background: var(--card);
    border-bottom: 1px solid var(--line);
    font-size: 12px;
  }
  .lb-fabric-row:last-child { border-bottom: none; }
  .lb-fabric-row.worst { background: var(--warn-bg); }
  .lb-fabric-row-name {
    display: flex;
    align-items: center;
    gap: 7px;
    color: var(--ink);
    flex: 1;
    min-width: 0;
  }
  .lb-fabric-row-name span:first-child { font-size: 14px; }
  .lb-fabric-tag {
    font-size: 8.5px;
    text-transform: uppercase;
    letter-spacing: 0.06em;
    color: var(--warn-fg);
    border: 1px solid var(--warn-line);
    border-radius: 8px;
    padding: 1px 6px;
    margin-left: 4px;
    flex-shrink: 0;
  }
  .lb-fabric-row-time { color: var(--ink-soft); font-size: 11px; white-space: nowrap; }
  .lb-fabric-row-dot {
    width: 7px; height: 7px;
    border-radius: 50%;
    flex-shrink: 0;
  }
  .lb-fabric-row-dot.good { background: var(--good-line); }
  .lb-fabric-row-dot.warn { background: var(--warn-line); }
  .lb-fabric-row-dot.bad  { background: var(--bad-line); }
  @media (max-width: 420px) {
    .lb-fabric-row { flex-wrap: wrap; row-gap: 3px; }
    .lb-fabric-row-name { order: 1; }
    .lb-fabric-row-dot { order: 2; }
    .lb-fabric-row-time { order: 3; flex-basis: 100%; padding-left: 21px; }
  }

  /* Schedule */
  .lb-schedule { border-top: 1px solid var(--line); padding-top: 4px; margin-bottom: 8px; }
  .lb-step {
    display: flex;
    gap: 14px;
    padding: 12px 0;
    border-bottom: 1px dashed var(--line);
    align-items: baseline;
  }
  .lb-step:last-child { border-bottom: none; }
  .lb-step-time {
    font-weight: 700;
    font-size: 13px;
    min-width: 92px;
    flex-shrink: 0;
    color: var(--ink);
  }
  .lb-step-label { font-size: 13px; color: var(--ink-soft); }
  .lb-step-label b { font-weight: 700; color: var(--ink); }

  /* Forecast strip */
  .lb-strip-label { margin: 30px 0 10px; }
  .lb-strip {
    display: flex;
    gap: 1px;
    border: 1px solid var(--line);
    border-radius: 6px;
    overflow: hidden;
  }
  .lb-strip-cell {
    flex: 1;
    padding: 11px 4px 9px;
    text-align: center;
    font-size: 9.5px;
    background: var(--card);
    border-right: 1px solid var(--line);
  }
  .lb-strip-cell:last-child { border-right: none; }
  .lb-strip-cell .lb-strip-time { color: var(--ink-faint); margin-bottom: 6px; }
  .lb-strip-cell .lb-strip-icon { font-size: 16px; margin-bottom: 5px; display: block; }
  .lb-strip-cell .lb-strip-cond { color: var(--ink-soft); font-size: 8.5px; line-height: 1.25; }

  .lb-footnote {
    font-size: 10px;
    color: var(--ink-faint);
    margin-top: 24px;
    line-height: 1.6;
    border-top: 1px solid var(--line);
    padding-top: 16px;
  }
  .lb-error {
    border: 1px dashed var(--bad-line);
    border-radius: 6px;
    padding: 14px 16px;
    font-size: 12px;
    color: var(--bad-fg);
    background: var(--bad-bg);
    margin-bottom: 20px;
    line-height: 1.55;
  }
  .lb-spin {
    display: inline-block;
    width: 12px; height: 12px;
    border: 2px solid var(--ink);
    border-top-color: transparent;
    border-radius: 50%;
    animation: lb-spin 0.7s linear infinite;
    margin-right: 6px;
    vertical-align: -1px;
  }
  @keyframes lb-spin { to { transform: rotate(360deg); } }

  @media (max-width: 420px) {
    .lb-headline { font-size: 21px; }
    .lb-strip-cell .lb-strip-icon { font-size: 14px; }
    .lb-masthead h1 { font-size: 15px; }
  }
</style>

<script>
(function () {
  const DRY_HOURS_BASELINE = 3.5;  // reference: light cotton, under "typical" Bedok conditions (70% RH, light breeze, partly cloudy)
  const WASH_HOURS = 2;            // wash cycle + time to hang clothes
  const LATEST_FINISH_HOUR = 19;   // don't want clothes drying past ~7pm
  const EARLIEST_START_HOUR = 6;   // don't suggest starting before 6am

  const FABRICS = [
    { id: 'synthetic', label: 'Synthetic / activewear', icon: '🩳', mult: 0.6 },
    { id: 'cotton',    label: 'Light cotton (tees, shirts)', icon: '👕', mult: 1.0 },
    { id: 'linen',     label: 'Bedsheets / linen', icon: '🛏️', mult: 1.2 },
    { id: 'denim',     label: 'Denim / jeans', icon: '👖', mult: 2.0 },
    { id: 'towel',     label: 'Towels (terry cloth)', icon: '🧺', mult: 2.3 },
  ];
  const DEFAULT_FABRIC_IDS = ['cotton', 'towel']; // sensible default: a typical mixed load spans these

  function humidityFactor(rh) {
    if (rh == null) return 1.0;
    if (rh <= 60) return 0.85;
    if (rh <= 75) return 1.0;
    if (rh <= 85) return 1.25;
    return 1.5;
  }
  function windFactor(kmh) {
    if (kmh == null) return 1.0;
    if (kmh < 10) return 1.15;
    if (kmh <= 20) return 1.0;
    return 0.85;
  }
  function skyFactor(conditionText) {
    const t = (conditionText || '').toLowerCase();
    if (t.includes('thundery') || (t.includes('heavy') && t.includes('rain'))) return 1.4;
    if (t.includes('shower') || t.includes('rain') || t.includes('drizzle')) return 1.3;
    if (t.includes('cloudy') || t.includes('hazy')) return 1.15;
    if (t.includes('fair') || t.includes('sunny')) return 0.85;
    return 1.0;
  }
  // Geometric-ish mean of the three factors keeps any single extreme reading from dominating
  function weatherMultiplier({ rh, windKmh, conditionText }) {
    const hf = humidityFactor(rh), wf = windFactor(windKmh), sf = skyFactor(conditionText);
    return Math.cbrt(hf * wf * sf);
  }
  function dryHoursFor(fabricId, wMult) {
    const f = FABRICS.find(x => x.id === fabricId);
    if (!f) return DRY_HOURS_BASELINE * wMult;
    return DRY_HOURS_BASELINE * wMult * f.mult;
  }

  const root = document.getElementById('laundry-root');

  function getStoredTheme() {
    try { return localStorage.getItem('laundry-brief-theme'); } catch (e) { return null; }
  }
  function setStoredTheme(v) {
    try { if (v) localStorage.setItem('laundry-brief-theme', v); else localStorage.removeItem('laundry-brief-theme'); } catch (e) {}
  }
  function applyTheme(theme) {
    if (theme === 'light' || theme === 'dark') {
      root.setAttribute('data-theme', theme);
      document.documentElement.setAttribute('data-theme', theme);
    } else {
      root.removeAttribute('data-theme');
      document.documentElement.removeAttribute('data-theme');
    }
  }
  function currentTheme() {
    const stored = getStoredTheme();
    if (stored) return stored;
    return window.matchMedia && window.matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light';
  }
  function themeToggleHTML() {
    const active = currentTheme();
    return `
      <div class="lb-theme-toggle" role="group" aria-label="Theme">
        <button id="lb-theme-light" class="${active === 'light' ? 'active' : ''}" aria-label="Light mode" title="Light mode">☀</button>
        <button id="lb-theme-dark" class="${active === 'dark' ? 'active' : ''}" aria-label="Dark mode" title="Dark mode">☾</button>
      </div>`;
  }
  function wireThemeToggle(rerender) {
    document.getElementById('lb-theme-light')?.addEventListener('click', () => { setStoredTheme('light'); applyTheme('light'); rerender(); });
    document.getElementById('lb-theme-dark')?.addEventListener('click', () => { setStoredTheme('dark'); applyTheme('dark'); rerender(); });
  }
  applyTheme(getStoredTheme());

  function fmtHour(h) {
    h = ((h % 24) + 24) % 24; // guard: never render a 24h+ overflow as a bogus PM time
    const hh = Math.floor(h);
    const mm = Math.round((h - hh) * 60);
    const period = hh >= 12 ? 'PM' : 'AM';
    let h12 = hh % 12; if (h12 === 0) h12 = 12;
    return mm === 0 ? `${h12}:00 ${period}` : `${h12}:${String(mm).padStart(2,'0')} ${period}`;
  }

  function parseHourFromISO(iso) {
    const d = new Date(iso);
    return d.getHours() + d.getMinutes() / 60;
  }
  function sgtDateStr(d) {
    const sgt = new Date(d.getTime() + 8 * 3600000);
    return sgt.toISOString().slice(0, 10);
  }
  function toSGTHour(d) {
    const sgt = new Date(d.getTime() + 8 * 3600000);
    return sgt.getUTCHours() + sgt.getUTCMinutes() / 60;
  }

  function conditionToRisk(forecastText) {
    const t = (forecastText || '').toLowerCase();
    if (t.includes('thundery')) return { level: 3, icon: '⛈', label: 'Thundery' };
    if (t.includes('heavy') && t.includes('rain')) return { level: 3, icon: '🌧', label: 'Heavy rain' };
    if (t.includes('shower') || t.includes('rain') || t.includes('drizzle')) return { level: 2, icon: '🌦', label: 'Showers' };
    if (t.includes('cloudy')) return { level: 1, icon: '☁️', label: 'Cloudy' };
    if (t.includes('hazy')) return { level: 1, icon: '🌫', label: 'Hazy' };
    if (t.includes('fair') || t.includes('sunny')) return { level: 0, icon: '☀️', label: 'Fair' };
    return { level: 1, icon: '⛅', label: forecastText || 'Unknown' };
  }

  function findAreaForecast(data, areaName) {
    try {
      const items = data?.data?.items || data?.items;
      const areaMeta = data?.data?.area_metadata || data?.data?.areaMetadata || data?.area_metadata;
      if (!items || !items.length) return null;
      const latest = items[items.length - 1];
      const forecasts = latest.forecasts || [];
      const match = forecasts.find(f => (f.area || f.name || '').toLowerCase() === areaName.toLowerCase());
      return { forecast: match, validPeriod: latest.valid_period || latest.validPeriod, timestamp: latest.timestamp, areaMeta };
    } catch (e) { return null; }
  }

  // Resolve the named forecast area closest to a coordinate, using the API's own
  // area_metadata list (embedded in the 2-hour nowcast). No external geocoding needed.
  function findNearestArea(lat, lng, areaMetadata) {
    if (!areaMetadata?.length) return null;
    let best = null, bestDist = Infinity;
    for (const area of areaMetadata) {
      const aLat = area.label_location?.latitude ?? area.label_location?.lat;
      const aLng = area.label_location?.longitude ?? area.label_location?.lng;
      if (aLat == null || aLng == null) continue;
      const d = Math.hypot(lat - aLat, lng - aLng);
      if (d < bestDist) { bestDist = d; best = area.name; }
    }
    return best;
  }

  // The 24-hour forecast's per-period `regions` object is keyed by NEA's five broad
  // regions, not by named area. Pick the one whose approximate centroid is nearest the
  // active location so the hourly risk profile reflects where the user actually is.
  const REGION_CENTROIDS = {
    central: { lat: 1.35, lng: 103.82 },
    north:   { lat: 1.43, lng: 103.82 },
    south:   { lat: 1.27, lng: 103.82 },
    east:    { lat: 1.35, lng: 103.96 },
    west:    { lat: 1.34, lng: 103.70 },
  };
  function regionForCoord(lat, lng) {
    let best = 'central', bestDist = Infinity;
    for (const [name, c] of Object.entries(REGION_CENTROIDS)) {
      const d = Math.hypot(lat - c.lat, lng - c.lng);
      if (d < bestDist) { bestDist = d; best = name; }
    }
    return best;
  }

  async function fetchJSON(url) {
    const res = await fetch(url, { headers: { 'Accept': 'application/json' } });
    if (!res.ok) throw new Error('HTTP ' + res.status);
    return res.json();
  }

  // Pick the station reading closest to the active location from a v1-style
  // { metadata: { stations: [{id, location:{lat,lng}}] }, items: [{ readings: [{station_id, value}] }] } payload.
  // FALLBACK is Bedok (eastern Singapore) — used when GPS is denied and no home is saved.
  const FALLBACK_LAT = 1.3236, FALLBACK_LNG = 103.9273;
  function nearestStationReading(data, lat, lng) {
    try {
      const stations = data?.metadata?.stations || data?.data?.stations || [];
      const items = data?.items || data?.data?.readings || [];
      if (!stations.length || !items.length) return null;
      let best = null, bestDist = Infinity;
      for (const s of stations) {
        const sLat = s.location?.latitude ?? s.location?.lat;
        const sLng = s.location?.longitude ?? s.location?.lng;
        if (sLat == null || sLng == null) continue;
        const d = Math.hypot(sLat - lat, sLng - lng);
        if (d < bestDist) { bestDist = d; best = s; }
      }
      if (!best) return null;
      const latest = items[items.length - 1];
      const readings = latest.readings || [];
      const match = readings.find(r => r.station_id === best.id);
      return match ? match.value : null;
    } catch (e) { return null; }
  }

  async function loadWeather(lat, lng) {
    const endpoints2hr = [
      'https://api-open.data.gov.sg/v2/real-time/api/two-hour-weather-forecast',
      'https://api.data.gov.sg/v1/environment/2-hour-weather-forecast'
    ];
    const endpoints24hr = [
      'https://api-open.data.gov.sg/v2/real-time/api/twenty-four-hour-weather-forecast',
      'https://api.data.gov.sg/v1/environment/24-hour-weather-forecast'
    ];
    const endpointsHumidity = ['https://api.data.gov.sg/v1/environment/relative-humidity'];
    const endpointsWind = ['https://api.data.gov.sg/v1/environment/wind-speed'];

    let nowcast = null, lastErr = null;
    for (const url of endpoints2hr) {
      try { nowcast = await fetchJSON(url); if (nowcast) break; } catch (e) { lastErr = e; }
    }
    let outlook24 = null;
    for (const url of endpoints24hr) {
      try { outlook24 = await fetchJSON(url); if (outlook24) break; } catch (e) { /* non-fatal */ }
    }
    if (!nowcast) throw lastErr || new Error('No nowcast data available');

    // Humidity and wind are nice-to-have refinements — failures here are non-fatal,
    // the model just falls back to condition-text-only weather adjustment.
    let humidity = null, windKmh = null;
    try {
      const h = await fetchJSON(endpointsHumidity[0]);
      humidity = nearestStationReading(h, lat, lng);
    } catch (e) { /* fall back silently */ }
    try {
      const w = await fetchJSON(endpointsWind[0]);
      const knots = nearestStationReading(w, lat, lng);
      // NEA's real-time station feed reports wind speed in knots; convert to km/h for our thresholds.
      windKmh = knots != null ? knots * 1.852 : null;
    } catch (e) { /* fall back silently */ }

    return { nowcast, outlook24, humidity, windKmh };
  }

  function render(state) {
    if (state.status === 'loading') {
      root.innerHTML = `
        <div class="lb-wrap">
          <div class="lb-masthead">

          </div>

            <p class="lb-sub">Pulling the latest 2-hour nowcast and 24-hour outlook from MSS / NEA for your area.</p>

      root.innerHTML = `

    // NB: locationMode is intentionally NOT destructured here — it's the module-level `let`
    // so the toggle handlers below can reassign it (a const copy would throw on assignment).
    const { areaCondition, riskNow, hourly, hourlyRiskFull, dailyHigh, dailyLow, humidityRange, regionOutlook, nowHour, plan, fetchedAt, fabricPlans, slowestFabricId, humidity, windKmh, wMult, isTomorrow, areaName, gpsAreaName, storedHome, showLocationToggle, canSaveHome, estimated } = state.data;

    document.title = `Laundry Brief — ${areaName}`;

    const verdictClass = plan.verdict === 'good' ? 'good' : plan.verdict === 'warn' ? 'warn' : 'bad';

    const slowestFabric = FABRICS.find(f => f.id === slowestFabricId) || FABRICS.find(f => f.id === 'cotton');
    let headline, sub;
    if (plan.verdict === 'good') {
      headline = isTomorrow ? `Tomorrow — Start by ${fmtHour(plan.startBy)}` : `Start by ${fmtHour(plan.startBy)}`;

        ? `Based on tomorrow's forecast, wash before ${fmtHour(plan.startBy)} and you'll have it on the line by ${fmtHour(plan.hangBy)}, with roughly ${plan.dryWindowHours.toFixed(1)}h of dry time before conditions turn. Good margin for ${slowestFabric.label.toLowerCase()}.`
        : `Wash now and you'll have it on the line by ${fmtHour(plan.hangBy)}, with roughly ${plan.dryWindowHours.toFixed(1)}h of dry time before conditions turn. Good margin — based on your slowest-drying pick, ${slowestFabric.label.toLowerCase()}.`;
    } else if (plan.verdict === 'warn') {
      headline = isTomorrow ? `Tomorrow — Start by ${fmtHour(plan.startBy)}, tight` : `Start by ${fmtHour(plan.startBy)} — tight`;
      sub = isTomorrow

    } else {

    const stripHTML = hourly.map(h => `

      </div>`).join('');

    // Timeline SVG: 6am to 8pm
    const tlStart = 6, tlEnd = 20, tlSpan = tlEnd - tlStart;
    const W = 600, H = 92, pad = 6;
    const xOf = (h) => pad + ((h - tlStart) / tlSpan) * (W - pad * 2);
    const clampH = (h) => Math.max(tlStart, Math.min(tlEnd, h));

    const stageTop = 10, stageH = 22;
    const riskTop = stageTop + stageH + 10, riskH = 10;

    const startX = xOf(clampH(plan.startBy));
    const hangX = xOf(clampH(plan.hangBy));
    const dryX = xOf(clampH(plan.dryBy));
    const riskAtX = xOf(clampH(plan.riskAt));
    const nowX = nowHour >= tlStart && nowHour <= tlEnd ? xOf(nowHour) : null;

    // Stage 1: wash & hang (startBy -> hangBy)
    const washX0 = startX, washX1 = hangX;
    // Stage 2: drying (hangBy -> dryBy), capped to riskAt if rain risk cuts in before drying finishes
    const dryingX0 = hangX, dryingX1 = Math.min(dryX, xOf(tlEnd));
    // Safe buffer remaining after drying completes, before risk rises (only when plan succeeds with margin)
    const bufferX0 = dryingX1, bufferX1 = Math.max(dryingX1, riskAtX);

    const stageRectsParts = [];
    if (washX1 > washX0) stageRectsParts.push(`<rect x="${washX0}" y="${stageTop}" width="${washX1-washX0}" height="${stageH}" rx="3" fill="var(--rope)" opacity="0.85"/>`);
    if (dryingX1 > dryingX0) stageRectsParts.push(`<rect x="${dryingX0}" y="${stageTop}" width="${dryingX1-dryingX0}" height="${stageH}" rx="3" fill="var(--dry-line)" opacity="0.85"/>`);
    if (plan.verdict !== 'bad' && bufferX1 > bufferX0) stageRectsParts.push(`<rect x="${bufferX0}" y="${stageTop}" width="${bufferX1-bufferX0}" height="${stageH}" rx="3" fill="var(--dry-line)" opacity="0.28"/>`);
    const stageRects = stageRectsParts.join('');

    // Rain-risk heat strip across the full day using hourlyRiskFull (6..20, every hour)
    const riskColor = (lvl) => lvl >= 3 ? 'var(--bad-line)' : lvl === 2 ? 'var(--warn-line)' : lvl === 1 ? 'var(--ink-faint)' : 'var(--good-line)';
    const riskCells = hourlyRiskFull.map((r, i) => {
      const x0 = xOf(r.hour);
      const x1 = i < hourlyRiskFull.length - 1 ? xOf(hourlyRiskFull[i+1].hour) : xOf(tlEnd);
      return `<rect x="${x0}" y="${riskTop}" width="${Math.max(0,x1-x0)}" height="${riskH}" fill="${riskColor(r.level)}" opacity="0.55"/>`;
    }).join('');

    // Bar labels live in HTML (see .lb-track-cap), not in the SVG: the SVG uses
    // preserveAspectRatio="none", which on a narrow screen squashes the x-axis and
    // would horizontally compress any <text>. Rects don't visibly suffer.
    const svg = `
      <svg viewBox="0 0 ${W} ${H}" preserveAspectRatio="none">
        <rect x="${pad}" y="${stageTop}" width="${W-pad*2}" height="${stageH}" rx="3" fill="var(--line)"/>
        ${stageRects}
        <rect x="${pad}" y="${riskTop}" width="${W-pad*2}" height="${riskH}" rx="2" fill="var(--line)"/>
        ${riskCells}
        <line x1="${startX}" y1="${stageTop-4}" x2="${startX}" y2="${riskTop+riskH+4}" stroke="var(--ink)" stroke-width="1" stroke-dasharray="2,2" opacity="0.4"/>
        ${nowX !== null ? `<line x1="${nowX}" y1="2" x2="${nowX}" y2="${H-2}" stroke="var(--ink)" stroke-width="1.5"/><circle cx="${nowX}" cy="2" r="2.5" fill="var(--ink)"/><text x="${nowX}" y="${H-2}" font-size="8" fill="var(--ink)" font-family="monospace" text-anchor="${nowX > W-40 ? 'end' : 'start'}" dx="${nowX > W-40 ? -4 : 4}">now</text>` : ''}
      </svg>`;

    // Tick labels positioned by the same xOf() as the bars. Round hours land
    // exactly under their bar position; endpoints anchor to the edges so they
    // don't clip, the rest centre on their tick.
    const fmtTick = (h) => { let x = h % 12; if (x === 0) x = 12; return `${x} ${h >= 12 ? 'PM' : 'AM'}`; };
    const tickHours = [6, 8, 10, 12, 14, 16, 18, 20];
    const trackLabelsHTML = tickHours.map((h, i) => {
      const pct = (xOf(h) / W) * 100;
      const place = i === 0 ? 'left:0'
        : i === tickHours.length - 1 ? `left:${pct.toFixed(2)}%;transform:translateX(-100%)`
        : `left:${pct.toFixed(2)}%;transform:translateX(-50%)`;
      return `<span style="${place}">${fmtTick(h)}</span>`;
    }).join('');

    const legendHTML = `
      <div class="lb-legend">
        <div class="lb-legend-group">
          <span class="lb-legend-title">Stages</span>
          <span class="lb-legend-item"><i style="background:var(--rope)"></i>Wash &amp; hang</span>
          <span class="lb-legend-item"><i style="background:var(--dry-line)"></i>Drying</span>
          <span class="lb-legend-item"><i style="background:var(--dry-line);opacity:.4"></i>Safe buffer</span>
        </div>
        <div class="lb-legend-group">
          <span class="lb-legend-title">Rain risk</span>
          <span class="lb-legend-item"><i style="background:var(--good-line);opacity:.55"></i>Clear</span>
          <span class="lb-legend-item"><i style="background:var(--ink-faint);opacity:.55"></i>Low risk</span>
          <span class="lb-legend-item"><i style="background:var(--warn-line);opacity:.55"></i>Showers</span>
          <span class="lb-legend-item"><i style="background:var(--bad-line);opacity:.55"></i>Thundery</span>

    const fabricChipsHTML = FABRICS.map(f => `

          <div class="lb-fabric-row-time">~${fp.dryHours.toFixed(1)}h dry · ${fp.plan.dryBy > LATEST_FINISH_HOUR ? `won't finish by evening` : `ready by <b>${fmtHour(fp.plan.dryBy)}</b>`}</div>
          <div class="lb-fabric-row-dot ${fv}"></div>

    const weatherReadoutHTML = `
      <div class="lb-weather-readout">
        <span>${humidity != null ? `Humidity ${Math.round(humidity)}%` : 'Humidity n/a'}</span>
        <span>${windKmh != null ? `Wind ${windKmh.toFixed(0)} km/h` : 'Wind n/a'}</span>
        <span>Drying speed ${wMult < 0.95 ? 'faster' : wMult > 1.1 ? 'slower' : 'typical'} than usual (×${wMult.toFixed(2)})</span>
      </div>`;

    const locationHTML = showLocationToggle
      ? `<div class="lb-loc-stack">
          <div class="lb-loc-toggle" role="group" aria-label="Location">
            <button id="lb-loc-gps" class="${locationMode === 'gps' ? 'active' : ''}" title="Use current location">📍 ${gpsAreaName}</button>
            <button id="lb-loc-home" class="${locationMode === 'home' ? 'active' : ''}" title="Use saved home">🏠 ${storedHome.label}</button>
          </div>
          ${locationMode === 'gps' && gpsCoords && gpsAreaName
            ? `<button class="lb-sethome" id="lb-set-home" title="Replace your saved home with ${gpsAreaName}">Set ${gpsAreaName} as home</button>`
            : ''}
        </div>`
      : `<span class="lb-loc" id="lb-loc-label"${canSaveHome ? ' data-saveable="true" title="Tap to save as home"' : ''}>${locationMode === 'home' ? '🏠' : '📍'} ${areaName}, SG</span>`;

    // When the 24h forecast had no usable period data, the hourly profile is a coarse

    const estBadge = estimated
      ? `<span class="lb-est-badge" title="No detailed hourly forecast was available — this is a coarse estimate from the day's general outlook">estimated</span>`
      : '';

    // Eyebrow shows two distinct readings: the 2-hour nowcast for the nearest named
    // area, and the 24-hour island-wide general outlook. Tag each with its source, and

    const sameCondition = (a, b) => !!a && !!b && a.trim().toLowerCase() === b.trim().toLowerCase();
    const srcTag = (label) => `<span class="lb-src">(${label})</span>`;
    const regionDiffers = regionOutlook && !sameCondition(regionOutlook, areaCondition);
    const eyebrowText = isTomorrow
      ? `Tomorrow's forecast${regionOutlook ? ` · ${regionOutlook} ${srcTag('island-wide')}` : ''}`
      : `Right now: ${riskNow.icon} ${areaCondition}${regionDiffers ? ` ${srcTag('local')}` : ''}` +
        (regionDiffers ? ` · ${regionOutlook} ${srcTag('island-wide')}` : '');

    root.innerHTML = `
      <div class="lb-wrap">
        <div class="lb-masthead">
          <div class="lb-masthead-left"><h1>Laundry Brief</h1>${locationHTML}</div>
          ${themeToggleHTML()}
        </div>
        <div class="lb-updated">Live · MSS/NEA · fetched ${fetchedAt}<button id="lb-retry">Refresh</button></div>

        <div class="lb-verdict ${verdictClass}">
          <div class="lb-eyebrow">${eyebrowText}</div>
          <h2 class="lb-headline">${headline}</h2>
          <p class="lb-sub">${sub}</p>
        </div>

        <div class="lb-fabric-picker">
          <div class="lb-timeline-label">What's in the load?</div>
          <div class="lb-fabric-chips">${fabricChipsHTML}</div>
          ${weatherReadoutHTML}
        </div>

        <div class="lb-fabric-breakdown">${fabricBreakdownHTML}</div>

        <div class="lb-timeline">
          <div class="lb-timeline-label">${isTomorrow ? "Tomorrow's window" : "Today's window"} — 6 AM to 8 PM${estBadge}</div>
          <div class="lb-track"><span class="lb-track-cap lb-track-cap-stage">Laundry stages</span><span class="lb-track-cap lb-track-cap-risk">Rain risk</span>${svg}</div>
          <div class="lb-track-labels">${trackLabelsHTML}</div>
          ${legendHTML}
        </div>

        ${stepsHTML}

        <div class="lb-strip-label">Hour-by-hour outlook${estBadge}</div>
        <div class="lb-strip">${stripHTML}</div>

        <div class="lb-footnote">
          High ${dailyHigh}°C · Low ${dailyLow}°C · RH ${humidityRange}<br/>
          Plan assumes ${WASH_HOURS}h to wash and hang, then fabric- and weather-adjusted dry time for your selected load. Singapore's afternoon thundery showers can build faster than forecast — bring laundry in early if clouds darken.
        </div>
      </div>`;

    document.getElementById('lb-retry')?.addEventListener('click', () => boot(true));
    wireThemeToggle(() => render(state));
    document.getElementById('lb-loc-gps')?.addEventListener('click', () => {
      locationMode = 'gps'; setStoredMode('gps'); boot();
    });
    document.getElementById('lb-loc-home')?.addEventListener('click', () => {
      locationMode = 'home'; setStoredMode('home'); boot();
    });
    document.getElementById('lb-set-home')?.addEventListener('click', () => {
      if (!gpsCoords || !gpsAreaName) return;
      setStoredHome({ lat: gpsCoords.lat, lng: gpsCoords.lng, label: gpsAreaName });
      const el = document.getElementById('lb-set-home');

    });
    document.getElementById('lb-loc-label')?.addEventListener('click', () => {
      if (!canSaveHome || !gpsCoords) return;
      setStoredHome({ lat: gpsCoords.lat, lng: gpsCoords.lng, label: areaName });
      const el = document.getElementById('lb-loc-label');
      if (el) el.textContent = '🏠 Home saved!';
      setTimeout(boot, 700);
    });
    document.querySelectorAll('.lb-fabric-chip').forEach(btn => {
      btn.addEventListener('click', () => {
        const id = btn.getAttribute('data-fabric');
        const idx = selectedFabricIds.indexOf(id);
        if (idx >= 0) {
          if (selectedFabricIds.length > 1) selectedFabricIds.splice(idx, 1); // keep at least one selected
        } else {
          selectedFabricIds.push(id);
        }
        setStoredFabrics(selectedFabricIds);
        boot();
      });
    });
  }

  function buildPlan(nowHour, hourlyRiskByHour, dryHours) {
    // hourlyRiskByHour: array of {hour, level} for hour 6..20, level 0(fair)-3(thundery/heavy)
    // Rain risk threshold: level >= 2 counts as "wet risk"
    const findRiskStart = (fromHour) => {
      for (const h of hourlyRiskByHour) {
        if (h.hour >= fromHour && h.level >= 2) return h.hour;
      }
      return 20; // no risk found in window -> treat end of day as boundary
    };

    // Try starting now (rounded up to next 15 min), else nearest feasible later start, else fail
    const candidateStart = Math.max(EARLIEST_START_HOUR, Math.ceil(nowHour * 4) / 4);
    const riskAt = findRiskStart(candidateStart);
    // Drying effectively stalls after sunset (~7pm in SG) regardless of rain, so the
    // usable deadline is whichever comes first: the next rain-risk hour or LATEST_FINISH_HOUR.
    const deadline = Math.min(riskAt, LATEST_FINISH_HOUR);
    const hangBy = candidateStart + WASH_HOURS;
    const dryBy = hangBy + dryHours;
    const dryWindowHours = deadline - hangBy;

    let verdict;
    if (dryBy <= deadline) verdict = 'good';
    else if (dryWindowHours >= dryHours * 0.7 && hangBy < deadline) verdict = 'warn';
    else verdict = 'bad';

    return { startBy: candidateStart, hangBy, dryBy, riskAt, deadline, dryWindowHours, verdict, dryHours };
  }

  function getStoredFabrics() {
    try {
      const raw = localStorage.getItem('laundry-brief-fabrics');
      if (!raw) return null;
      const ids = JSON.parse(raw);
      return Array.isArray(ids) && ids.length ? ids.filter(id => FABRICS.some(f => f.id === id)) : null;
    } catch (e) { return null; }
  }
  function setStoredFabrics(ids) {
    try { localStorage.setItem('laundry-brief-fabrics', JSON.stringify(ids)); } catch (e) {}
  }
  let selectedFabricIds = getStoredFabrics() || DEFAULT_FABRIC_IDS.slice();

  // Home: { lat, lng, label } — label is the resolved area name string, e.g. "Tampines".
  function getStoredHome() {
    try {
      const raw = localStorage.getItem('laundry-brief-home');
      if (!raw) return null;
      const h = JSON.parse(raw);
      return (h && typeof h.lat === 'number' && typeof h.lng === 'number' && h.label) ? h : null;
    } catch (e) { return null; }
  }
  function setStoredHome(home) {
    try {
      if (home) localStorage.setItem('laundry-brief-home', JSON.stringify(home));
      else localStorage.removeItem('laundry-brief-home');
    } catch (e) {}
  }
  // Mode: 'gps' | 'home'
  function getStoredMode() {
    try { const m = localStorage.getItem('laundry-brief-mode'); return (m === 'gps' || m === 'home') ? m : null; } catch (e) { return null; }
  }
  function setStoredMode(mode) {
    try { localStorage.setItem('laundry-brief-mode', mode); } catch (e) {}
  }

  let gpsCoords = null;                          // { lat, lng } — resolved once per session, cached so chip taps don't re-prompt
  let locationMode = getStoredMode() || 'gps';   // 'gps' | 'home'
  let lastAreaName = 'your area';                // last successfully resolved area, shown during loading re-renders

  function getGPSPosition(maxAge) {
    return new Promise((resolve, reject) => {
      if (!navigator.geolocation) return reject(new Error('no geolocation'));
      navigator.geolocation.getCurrentPosition(resolve, reject,
        { timeout: 12000, maximumAge: maxAge ?? 300000, enableHighAccuracy: false });
    });
  }

  async function boot(forceGPS) {
    render({ status: 'loading' });
    try {
      // Phase A — resolve coords. Attempt a GPS fix once per session regardless of mode so the
      // "📍 Here" toggle option always has a label; a granted permission won't re-prompt, a denied
      // one rejects instantly. Which coords actually drive the weather is chosen by mode below.
      // forceGPS (manual Refresh) drops the session cache and asks for a fresh fix (maximumAge 0).
      if (forceGPS === true) gpsCoords = null;
      if (!gpsCoords) {
        try {
          const pos = await getGPSPosition(forceGPS === true ? 0 : undefined);
          gpsCoords = { lat: pos.coords.latitude, lng: pos.coords.longitude };
        } catch (e) { /* denied / unavailable — non-fatal */ }
      }
      const storedHome = getStoredHome();
      let activeLat, activeLng;
      if (locationMode === 'home' && storedHome) {
        activeLat = storedHome.lat; activeLng = storedHome.lng;
      } else if (gpsCoords) {
        activeLat = gpsCoords.lat; activeLng = gpsCoords.lng;
      } else if (storedHome) {
        activeLat = storedHome.lat; activeLng = storedHome.lng;
      } else {
        activeLat = FALLBACK_LAT; activeLng = FALLBACK_LNG;
      }

      const { nowcast, outlook24, humidity, windKmh } = await loadWeather(activeLat, activeLng);

      // Phase B — resolve area name from the nowcast's embedded area_metadata.
      const areaMeta = nowcast?.data?.area_metadata || nowcast?.data?.areaMetadata || nowcast?.area_metadata;
      const areaName = (areaMeta && findNearestArea(activeLat, activeLng, areaMeta)) || storedHome?.label || 'Bedok';
      lastAreaName = areaName;

      // Phase C — UI toggle / save-home state.
      const gpsAreaName = (gpsCoords && areaMeta) ? findNearestArea(gpsCoords.lat, gpsCoords.lng, areaMeta) : null;
      const showLocationToggle = !!(gpsCoords && storedHome && gpsAreaName && gpsAreaName !== storedHome.label);
      const canSaveHome = locationMode === 'gps' && !!gpsCoords && !!areaMeta && (!storedHome || gpsAreaName !== storedHome.label);

      const areaInfo = findAreaForecast(nowcast, areaName);
      const areaCondition = areaInfo?.forecast?.forecast || areaInfo?.forecast?.condition || `No data for ${areaName}`;
      const riskNow = conditionToRisk(areaCondition);

      const now = new Date();
      const nowHour = now.getHours() + now.getMinutes() / 60;
      const isTomorrow = nowHour >= LATEST_FINISH_HOUR;
      const targetDateStr = isTomorrow
        ? sgtDateStr(new Date(now.getTime() + 24 * 3600000))
        : sgtDateStr(now);

      // Build hourly risk profile 6am-8pm using 24hr regional (east) forecast text as a coarse signal,
      // refined by the 2-hour nowcast for the immediate hours.
      let regionOutlook = null;
      let dailyHigh = '—', dailyLow = '—', humidityRange = '—';
      const hourlyDisplay = [];
      const hourlyRisk = [];

      const generalForecast = outlook24?.data?.records?.[0]?.general || outlook24?.items?.[0]?.general;
      if (generalForecast) {
        dailyHigh = generalForecast.temperature?.high ?? dailyHigh;
        dailyLow = generalForecast.temperature?.low ?? dailyLow;
        const rh = generalForecast.relative_humidity || generalForecast.relativeHumidity;
        if (rh?.low != null && rh?.high != null) humidityRange = `${rh.low}–${rh.high}%`;
        regionOutlook = generalForecast.forecast?.text || generalForecast.forecast || null;
      }
      const periods = outlook24?.data?.records?.[0]?.periods || outlook24?.items?.[0]?.periods;

      // Build hourly risk 6–20 from 24hr period data for the region nearest the active
      // location if available, else heuristic fallback.
      // Uses date-aware overlap so tomorrow mode only picks up periods that fall on the target day.
      const region = regionForCoord(activeLat, activeLng);
      const periodRiskByHour = {};
      if (periods && periods.length) {
        const targetDayStart = new Date(targetDateStr + 'T06:00:00+08:00');
        const targetDayEnd   = new Date(targetDateStr + 'T21:00:00+08:00'); // 9pm cap covers the h=20 display slot
        for (const p of periods) {
          const pStart = new Date(p.timePeriod?.start || p.time?.start);
          const pEnd   = new Date(p.timePeriod?.end   || p.time?.end);
          const overlapStart = new Date(Math.max(pStart, targetDayStart));
          const overlapEnd   = new Date(Math.min(pEnd, targetDayEnd));
          if (overlapStart >= overlapEnd) continue;
          const r = conditionToRisk(p.regions?.[region] ?? p.regions?.east ?? '');
          const startH = toSGTHour(overlapStart);
          const endH   = toSGTHour(overlapEnd);
          for (let h = Math.floor(startH); h < Math.ceil(endH) && h <= 20; h++) periodRiskByHour[h] = r;
        }
      }
      const hasPeriodData = Object.keys(periodRiskByHour).length > 0;
      // Heuristic-only: if the day's text mentions wet weather, flag the afternoon — but let
      // conditionToRisk set the actual severity (Showers=2 vs Thundery=3) rather than always
      // assuming the worst. Null when the text is dry, so the afternoon stays partly cloudy.
      const afternoonRisk = (!hasPeriodData && /thunder|shower|rain/i.test(regionOutlook || areaCondition || ''))
        ? conditionToRisk(regionOutlook || areaCondition)
        : null;

      for (let h = 6; h <= 20; h++) {
        let r;
        if (hasPeriodData) {
          r = periodRiskByHour[h] ?? { level: 0, icon: '☀️', label: 'Fair' };
        } else if (h <= 9) {
          r = riskNow.level >= 2 ? riskNow : { level: 0, icon: '☀️', label: 'Fair' };
        } else if (h <= 12) {
          r = { level: 1, icon: '⛅', label: 'Partly cloudy' };
        } else if (h <= 18 && afternoonRisk) {
          r = afternoonRisk;
        } else if (h <= 18) {
          r = { level: 1, icon: '⛅', label: 'Partly cloudy' };
        } else {
          r = { level: 1, icon: '☁️', label: 'Cloudy' };
        }
        hourlyRisk.push({ hour: h, level: r.level });
        if (h % 2 === 0) hourlyDisplay.push({ hour: h, icon: r.icon, label: r.label });
      }
      // Overlay current nowcast on the nearest display slot (today only; irrelevant for tomorrow)
      if (!isTomorrow) {
        const nearest = hourlyDisplay.reduce((a, b) => Math.abs(b.hour - nowHour) < Math.abs(a.hour - nowHour) ? b : a, hourlyDisplay[0]);
        if (nearest) { nearest.icon = riskNow.icon; nearest.label = riskNow.label; }
      }

      // For tomorrow mode, prefer tomorrow's general forecast over tonight's nowcast as sky condition
      const wMult = weatherMultiplier({ rh: humidity, windKmh, conditionText: isTomorrow ? (regionOutlook || areaCondition) : (areaCondition || regionOutlook) });
      const planNowHour = isTomorrow ? EARLIEST_START_HOUR : nowHour;

      // Build a plan per selected fabric, then pick the slowest-drying selected fabric to
      // drive the headline verdict — that's the realistic constraint for a mixed load.
      const fabricPlans = selectedFabricIds.map(id => {
        const dh = dryHoursFor(id, wMult);
        return { id, fabric: FABRICS.find(f => f.id === id), dryHours: dh, plan: buildPlan(planNowHour, hourlyRisk, dh) };
      });
      fabricPlans.sort((a, b) => b.dryHours - a.dryHours);
      const slowest = fabricPlans[0] || { id: 'cotton', fabric: FABRICS.find(f => f.id === 'cotton'), dryHours: DRY_HOURS_BASELINE * wMult, plan: buildPlan(planNowHour, hourlyRisk, DRY_HOURS_BASELINE * wMult) };
      const plan = slowest.plan;

      render({
        status: 'ready',
        data: {
          areaCondition, riskNow, hourly: hourlyDisplay, hourlyRiskFull: hourlyRisk, dailyHigh, dailyLow, humidityRange,
          regionOutlook, nowHour, plan, fabricPlans, slowestFabricId: slowest.id, estimated: !hasPeriodData,
          humidity, windKmh, wMult, isTomorrow,
          areaName, locationMode, gpsAreaName, storedHome, showLocationToggle, canSaveHome,
          fetchedAt: now.toLocaleTimeString('en-SG', { hour: '2-digit', minute: '2-digit' })
        }
      });
    } catch (err) {
      render({ status: 'error', message: err?.message });
    }
  }

  boot();
})();
</script>
</body>
</html>
